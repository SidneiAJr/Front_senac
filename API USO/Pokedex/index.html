<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemom | Uso API</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <script src="index.js"></script>
     <link rel="shortcut icon" href="https://img.icons8.com/color/48/pointer.png" type="image/x-icon">
</head>

<body>
    <div class="Container">
        <div class="conteiner-texto">
            <h1>Pokémom</h1>
            <div id="Saida" class="saida"><div id="img"></div></div>
            <input type="number" id="NumeroPokemom" placeholder="(ex:ID Pokemom 1-250)">
            <input type="text" id="nomePokemom" placeholder="(ex:Nome Pokemom)">
            <input type="text" id="tipoPokemom" placeholder="(ex:Terra)">
            <button onclick="ProcurarPokemom()">Pesquisar</button>
        </div>
    </div>

</body>

</html>
